<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Reset your Back2U password securely">
    <meta name="color-scheme" content="light">
    <title>Reset Password - Back2u</title>
    <link rel="stylesheet" href="/stylesheets/tailwind-fallback.css">
    <script src="https://cdn.tailwindcss.com" defer></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-slide-in { animation: slideIn 0.6s ease-out; }
        .input-focus:focus { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1); }
    </style>
</head>
<body class="flex flex-col min-h-screen bg-gradient-to-b from-slate-50 to-white text-gray-800">
    <nav class="bg-white sticky top-0 z-50 shadow-xl border-b-2 border-gradient-to-r from-blue-200 to-cyan-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-8 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <span class="text-4xl animate-pulse">🔍</span>
                <div class="text-3xl font-bold bg-gradient-to-r from-blue-600 to-cyan-600 bg-clip-text text-transparent">Back2u</div>
            </div>
            <div class="hidden lg:flex gap-4 items-center">
                <a href="login.html" class="text-gray-700 hover:text-blue-600 transition-all font-semibold px-4 py-2 rounded-xl hover:bg-gradient-to-r hover:from-blue-50 hover:to-cyan-50">🔑 Login</a>
                <a href="register.html" class="px-6 py-2 bg-blue-600 text-white hover:bg-blue-700 rounded-xl transition-all font-semibold hover:shadow-lg">📝 Register</a>
            </div>
        </div>
    </nav>

    <div class="max-w-md mx-auto px-4 sm:px-8 py-12 flex-1 w-full">
        <div class="bg-white rounded-2xl p-8 shadow-lg border border-gray-100 animate-slide-in">
            <div class="flex items-center gap-3 mb-2">
                <span class="text-4xl">🔑</span>
                <h1 class="text-3xl font-bold bg-gradient-to-r from-blue-600 to-cyan-600 bg-clip-text text-transparent">Set New Password</h1>
            </div>
            <p class="text-gray-600 mb-8">Create a new password for your account.</p>

            <div id="invalidToken" class="bg-yellow-50 border-l-4 border-yellow-500 text-yellow-700 p-4 rounded-lg mb-6 hidden" role="alert"></div>
            <div id="successMessage" class="bg-green-50 border-l-4 border-green-500 text-green-700 p-4 rounded-lg mb-6 hidden" role="alert"></div>
            <div id="errorMessage" class="bg-red-50 border-l-4 border-red-500 text-red-700 p-4 rounded-lg mb-6 hidden" role="alert"></div>

            <form id="resetPasswordForm" class="space-y-6" style="display: none;">
                <div id="emailDisplay" class="p-3 bg-blue-50 rounded-lg border border-blue-200 text-sm text-blue-700"></div>

                <div>
                    <label for="newPassword" class="block mb-2 font-semibold text-gray-700 text-sm">New Password *</label>
                    <input type="password" id="newPassword" name="newPassword" required placeholder="Enter new password" autocomplete="new-password" spellcheck="false" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-base transition-all input-focus focus:outline-none">
                    <div id="passwordRequirements" class="mt-3 p-3 bg-gray-50 rounded-lg text-xs space-y-1">
                        <div id="req-length" class="text-gray-500">❌ At least 8 characters</div>
                        <div id="req-number" class="text-gray-500">❌ At least one number</div>
                        <div id="req-special" class="text-gray-500">❌ Special character (!@#$%^&*)</div>
                        <div id="req-uppercase" class="text-gray-500">❌ At least one uppercase letter</div>
                    </div>
                </div>

                <div>
                    <label for="confirmPassword" class="block mb-2 font-semibold text-gray-700 text-sm">Confirm Password *</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Confirm your password" autocomplete="new-password" spellcheck="false" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-base transition-all input-focus focus:outline-none">
                </div>

                <div class="flex gap-3 flex-wrap pt-4">
                    <button type="submit" class="flex-1 px-6 py-3 bg-gradient-to-r from-blue-600 to-cyan-600 text-white hover:shadow-lg transition-all font-semibold rounded-lg cursor-pointer">🔐 Reset Password</button>
                </div>
            </form>

            <div id="loadingMessage" class="text-center py-8">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
                <p class="text-gray-600 mt-4">Verifying reset link...</p>
            </div>
        </div>
    </div>

    <footer class="bg-gradient-to-r from-slate-900 to-slate-800 text-gray-300 text-center py-8 border-t border-slate-700 mt-auto">
        <p class="font-medium">&copy; 2026 Back2u. Finding what matters. 🎯</p>
    </footer>

    <script src="/javascripts/api.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const resetToken = urlParams.get('token');

        document.addEventListener('DOMContentLoaded', async () => {
            const form = document.getElementById('resetPasswordForm');
            const successMessage = document.getElementById('successMessage');
            const errorMessage = document.getElementById('errorMessage');
            const invalidToken = document.getElementById('invalidToken');
            const loadingMessage = document.getElementById('loadingMessage');
            const newPasswordField = document.getElementById('newPassword');
            const emailDisplay = document.getElementById('emailDisplay');

            if (!resetToken) {
                hideElement(loadingMessage);
                showError(invalidToken, '❌ No reset link provided. Please use the link from your email.');
                return;
            }

            // Verify the reset token
            try {
                const fullUrl = `${API_BASE_URL}/auth/verify-reset-token`;
                console.log('Verifying token at:', fullUrl);
                
                const response = await fetch(fullUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: resetToken })
                });

                const data = await response.json();
                console.log('Token verification response:', data);

                hideElement(loadingMessage);

                if (response.ok && data.valid) {
                    showElement(form);
                    emailDisplay.textContent = `📧 Resetting password for: ${data.email}`;
                } else {
                    showError(invalidToken, `❌ ${data.message || 'Invalid reset token'}. Please request a new password reset link.`);
                }
            } catch (error) {
                console.error('Error verifying token:', error);
                hideElement(loadingMessage);
                showError(invalidToken, 'Network error. Please try again later.');
            }

            // Password strength validation
            newPasswordField.addEventListener('input', () => {
                const password = newPasswordField.value;
                updatePasswordRequirements(password);
            });

            // Form submission
            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                const newPassword = newPasswordField.value;
                const confirmPassword = document.getElementById('confirmPassword').value;

                if (!newPassword || !confirmPassword) {
                    showError(errorMessage, 'Please fill in all fields');
                    return;
                }

                if (newPassword !== confirmPassword) {
                    showError(errorMessage, '❌ Passwords do not match');
                    return;
                }

                const passwordErrors = validatePassword(newPassword);
                if (passwordErrors.length > 0) {
                    showError(errorMessage, 'Password does not meet requirements:\n' + passwordErrors.join('\n'));
                    return;
                }

                try {
                    const response = await fetch(`${API_BASE_URL}/auth/reset-password`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            token: resetToken,
                            newPassword,
                            confirmPassword
                        })
                    });

                    const data = await response.json();

                    if (response.ok) {
                        hideElement(errorMessage);
                        showSuccess(successMessage, `✅ ${data.message || 'Password reset successfully!'}`);
                        form.reset();
                        
                        // Redirect to login after 3 seconds
                        setTimeout(() => {
                            window.location.href = '/login.html';
                        }, 3000);
                    } else {
                        hideElement(successMessage);
                        showError(errorMessage, data.message || 'Failed to reset password');
                    }
                } catch (error) {
                    console.error('Error:', error);
                    hideElement(successMessage);
                    showError(errorMessage, 'Network error. Please try again.');
                }
            });

            function updatePasswordRequirements(password) {
                const requirements = {
                    'req-length': password.length >= 8,
                    'req-number': /\d/.test(password),
                    'req-special': /[!@#$%^&*]/.test(password),
                    'req-uppercase': /[A-Z]/.test(password)
                };

                for (const [id, met] of Object.entries(requirements)) {
                    const element = document.getElementById(id);
                    if (met) {
                        element.classList.remove('text-gray-500');
                        element.classList.add('text-green-600');
                        element.textContent = element.textContent.replace('❌', '✅');
                    } else {
                        element.classList.remove('text-green-600');
                        element.classList.add('text-gray-500');
                        element.textContent = element.textContent.replace('✅', '❌');
                    }
                }
            }

            function validatePassword(password) {
                const errors = [];
                if (password.length < 8) errors.push('At least 8 characters');
                if (!/\d/.test(password)) errors.push('At least one number');
                if (!/[!@#$%^&*]/.test(password)) errors.push('Special character (!@#$%^&*)');
                if (!/[A-Z]/.test(password)) errors.push('At least one uppercase letter');
                return errors;
            }

            function showError(element, message) {
                element.textContent = message;
                element.classList.remove('hidden');
            }

            function showSuccess(element, message) {
                element.textContent = message;
                element.classList.remove('hidden');
            }

            function hideElement(element) {
                element.classList.add('hidden');
            }

            function showElement(element) {
                element.style.display = 'block';
            }
        });
    </script>
</body>
</html>
