<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Back2u</title>
    <link rel="stylesheet" href="/stylesheets/tailwind-fallback.css">
    <script src="https://cdn.tailwindcss.com" defer></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-slide-in { animation: slideIn 0.6s ease-out; }
        .input-focus:focus { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1); }
    </style>
</head>
<body class="flex flex-col min-h-screen bg-gradient-to-b from-slate-50 to-white text-gray-800">
    <nav class="bg-white sticky top-0 z-50 shadow-xl border-b-2 border-gradient-to-r from-blue-200 to-cyan-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-8 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <span class="text-4xl animate-pulse">🔍</span>
                <div class="text-3xl font-bold bg-gradient-to-r from-blue-600 to-cyan-600 bg-clip-text text-transparent">Back2u</div>
            </div>
            <div class="hidden lg:flex gap-4 items-center">
                <a href="login.html" class="text-gray-700 hover:text-blue-600 transition-all font-semibold px-4 py-2 rounded-xl hover:bg-gradient-to-r hover:from-blue-50 hover:to-cyan-50">🔑 Login</a>
                <a href="register.html" class="px-6 py-2 bg-blue-600 text-white hover:bg-blue-700 rounded-xl transition-all font-semibold hover:shadow-lg">📝 Register</a>
            </div>
        </div>
    </nav>

    <div class="max-w-md mx-auto px-4 sm:px-8 py-12 flex-1 w-full">
        <div class="bg-white rounded-2xl p-8 shadow-lg border border-gray-100 animate-slide-in">
            <div class="flex items-center gap-3 mb-2">
                <span class="text-4xl">🔐</span>
                <h1 class="text-3xl font-bold bg-gradient-to-r from-blue-600 to-cyan-600 bg-clip-text text-transparent">Reset Password</h1>
            </div>
            <p class="text-gray-600 mb-8">Enter your email address and we'll send you a link to reset your password.</p>

            <div id="successMessage" class="bg-green-50 border-l-4 border-green-500 text-green-700 p-4 rounded-lg mb-6 hidden" role="alert"></div>
            <div id="errorMessage" class="bg-red-50 border-l-4 border-red-500 text-red-700 p-4 rounded-lg mb-6 hidden" role="alert"></div>

            <form id="forgotPasswordForm" class="space-y-6">
                <div>
                    <label for="email" class="block mb-2 font-semibold text-gray-700 text-sm">Email Address *</label>
                    <input type="email" id="email" name="email" required placeholder="your.email@conestogac.on.ca" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-base transition-all input-focus focus:outline-none">
                </div>

                <div class="flex gap-3 flex-wrap pt-4">
                    <button type="submit" class="flex-1 px-6 py-3 bg-gradient-to-r from-blue-600 to-cyan-600 text-white hover:shadow-lg transition-all font-semibold rounded-lg cursor-pointer">📧 Send Reset Link</button>
                    <a href="login.html" class="flex-1 px-6 py-3 bg-gray-200 text-gray-700 hover:bg-gray-300 transition-all font-semibold rounded-lg text-center">Back to Login</a>
                </div>
            </form>

            <div class="mt-6 text-center text-sm text-gray-600">
                <p>Remember your password? <a href="login.html" class="text-blue-600 hover:underline font-semibold">Sign in here</a></p>
            </div>
        </div>
    </div>

    <footer class="bg-gradient-to-r from-slate-900 to-slate-800 text-gray-300 text-center py-8 border-t border-slate-700 mt-auto">
        <p class="font-medium">&copy; 2026 Back2u. Finding what matters. 🎯</p>
    </footer>

    <script src="/javascripts/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('forgotPasswordForm');
            const successMessage = document.getElementById('successMessage');
            const errorMessage = document.getElementById('errorMessage');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                const email = document.getElementById('email').value.trim();

                if (!email) {
                    showError(errorMessage, 'Please enter your email address');
                    return;
                }

                try {
                    const response = await fetch(`${API_BASE_URL}/auth/forgot-password`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ email })
                    });

                    const data = await response.json();

                    if (response.ok) {
                        hideMessage(errorMessage);
                        showSuccess(successMessage, `✅ ${data.message}`);
                        form.reset();
                        
                        // Show additional info
                        setTimeout(() => {
                            showSuccess(successMessage, `✅ Check your email (${email}) for the password reset link. The link will expire in 1 hour.`);
                        }, 2000);
                    } else {
                        hideMessage(successMessage);
                        showError(errorMessage, data.message || 'Failed to process request');
                    }
                } catch (error) {
                    console.error('Error:', error);
                    hideMessage(successMessage);
                    showError(errorMessage, 'Network error. Please try again.');
                }
            });

            function showError(element, message) {
                element.textContent = message;
                element.classList.remove('hidden');
            }

            function showSuccess(element, message) {
                element.textContent = message;
                element.classList.remove('hidden');
            }

            function hideMessage(element) {
                element.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
